<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>PulseCare HMS</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8yYChq9hQyI1jRnbZ0Wf0hU8uYb8Jkw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="main-panel">
        <header class="topbar">
          <div class="topbar__intro">
            <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open navigation menu">
              <i class="fa-solid fa-bars"></i>
            </button>
            <div class="topbar__brand">
              <div class="brand-badge"><i class="fa-solid fa-heart-pulse"></i></div>
              <div>
                <p class="eyebrow">Hospital Flow</p>
                <h1>PulseCare HMS</h1>
              </div>
            </div>
            <div>
              <p class="eyebrow" id="pageEyebrow">Welcome</p>
              <h2 id="pageTitle">Hospital Management System</h2>
            </div>
          </div>
          <div class="topbar__meta">
            <nav class="topbar__nav" id="sidebarNav"></nav>
            <button class="secondary-button hidden" id="installButton" type="button">
              <i class="fa-solid fa-download"></i>
              <span>Install App</span>
            </button>
            <button class="theme-toggle" id="themeToggle" type="button"></button>
            <button class="user-chip" id="userChip" type="button"></button>
            <button class="secondary-button hidden" id="logoutButton" type="button">
              <i class="fa-solid fa-arrow-right-from-bracket"></i>
              <span>Logout</span>
            </button>
          </div>
        </header>

        <main class="content" id="app"></main>
      </div>
    </div>
    <div class="nav-scrim hidden" id="navScrim"></div>

    <template id="loginTemplate">
      <section class="login-stage" aria-label="PulseCare sign in">
        <div class="login-panel">
          <div class="login-panel__brand">
            <div class="login-logo">PC</div>
            <strong>PulseCare HMS</strong>
          </div>
          <h2>PulseCare<br />HMS</h2>
          <p>
            Fast hospital booking, live queue visibility, and protected
            operations for patients, doctors, and administrators.
          </p>
          <div class="login-feature-grid" aria-label="Core features">
            <div>
              <strong>Book</strong>
              <span>Doctor visits</span>
            </div>
            <div>
              <strong>Queue</strong>
              <span>Live tokens</span>
            </div>
            <div>
              <strong>Care</strong>
              <span>Admin tools</span>
            </div>
          </div>
        </div>
        <div class="login-card">
          <p class="eyebrow">Secure Workspace</p>
          <h2>Sign in to<br />manage care.</h2>
          <p>
            Google authentication is connected. Your hospital dashboard,
            appointments, patient queues, and admin records stay protected
            behind your account.
          </p>
          <button class="login-google-button" id="loginButton" type="button">
            <i class="fa-brands fa-google"></i>
            <span>Continue with Google</span>
          </button>
        </div>
      </section>
    </template>

    <div class="toast-stack" id="toastStack"></div>
    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="spinner-card">
        <div class="spinner"></div>
        <p>Loading your hospital dashboard...</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/script.js"></script>
  </body>
</html>
